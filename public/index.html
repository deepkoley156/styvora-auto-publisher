<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styvora Auto-Publisher</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; padding: 20px; color: #111; }
    .container { max-width: 550px; background: #fff; padding: 30px; border-radius: 12px; margin: auto; border: 1px solid #e8e8e8; position: relative; }
    h2 { margin-top: 0; font-size: 24px; }
    
    .settings-btn { position: absolute; top: 25px; right: 25px; font-size: 24px; cursor: pointer; background: none; border: none; }
    .settings-box { display: none; background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    
    label { font-weight: bold; font-size: 14px; display: block; margin-top: 15px; margin-bottom: 5px; }
    input[type="text"], input[type="url"], input[type="password"], input[type="file"] { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; }
    
    .toggle-label { display: flex; align-items: center; cursor: pointer; margin-top: 15px; font-weight: normal; color: #d9534f; font-weight: bold;}
    .toggle-label input { width: auto; margin-right: 10px; transform: scale(1.3); cursor: pointer; }

    button.main-btn { width: 100%; margin-top: 20px; padding: 15px; background: #111; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    button.save-btn { width: 100%; margin-top: 15px; padding: 10px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .note { font-size: 13px; color: #666; margin-top: 8px; }
    #status { margin-top: 15px; font-weight: bold; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    <h2>Styvora Auto Publisher</h2>
    
    <div id="settingsBox" class="settings-box">
      <label for="geminiKey">Gemini API Key</label>
      <input type="password" id="geminiKey" placeholder="Enter your Gemini API Key here">
      
      <label class="toggle-label">
        <input type="checkbox" id="telegramBypass" onchange="updateUI()"> 
        Telegram Bypass (Direct Affiliate Link)
      </label>

      <button class="save-btn" onclick="saveSettings()">Save Settings</button>
      <div id="saveStatus" style="color: green; font-size: 12px; margin-top: 5px; display: none;">Settings Saved!</div>
    </div>
    
    <label for="productType">Product Type</label>
    <input type="text" id="productType" placeholder="e.g. Saree, Artificial Necklace">
    
    <label id="urlLabel" for="productUrl">Flipkart Product Link</label>
    <input type="url" id="productUrl" placeholder="Paste Flipkart URL here">
    
    <label for="productImage">Upload Product Image</label>
    <input type="file" id="productImage" accept="image/jpeg, image/png, image/webp">
    <div class="note">Pinterest-এর জন্য সবচেয়ে ভালো রেজোলিউশন হলো 1024x1536।</div>
    
    <button class="main-btn" onclick="publish()" id="submitBtn">Process & Publish</button>
    <div id="status"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const savedKey = localStorage.getItem("geminiApiKey");
      const savedBypass = localStorage.getItem("telegramBypass") === "true";
      
      if (savedKey) document.getElementById("geminiKey").value = savedKey;
      document.getElementById("telegramBypass").checked = savedBypass;
      
      updateUI();
    });

    function toggleSettings() {
      const box = document.getElementById("settingsBox");
      box.style.display = box.style.display === "block" ? "none" : "block";
    }

    function updateUI() {
      const isBypass = document.getElementById("telegramBypass").checked;
      const urlLabel = document.getElementById("urlLabel");
      const productUrl = document.getElementById("productUrl");

      if (isBypass) {
        urlLabel.textContent = "Direct Affiliate Link (Bypass ON)";
        urlLabel.style.color = "#d9534f";
        productUrl.placeholder = "Paste your generated affiliate link here";
      } else {
        urlLabel.textContent = "Flipkart Product Link";
        urlLabel.style.color = "#111";
        productUrl.placeholder = "Paste Flipkart URL here";
      }
    }

    function saveSettings() {
      const key = document.getElementById("geminiKey").value.trim();
      const isBypass = document.getElementById("telegramBypass").checked;
      
      localStorage.setItem("geminiApiKey", key);
      localStorage.setItem("telegramBypass", isBypass);
      
      const status = document.getElementById("saveStatus");
      status.style.display = "block";
      setTimeout(() => status.style.display = "none", 2000);
      
      updateUI();
    }

    async function publish() {
      const url = document.getElementById("productUrl").value.trim();
      const type = document.getElementById("productType").value.trim();
      const file = document.getElementById("productImage").files[0];
      const apiKey = localStorage.getItem("geminiApiKey") || document.getElementById("geminiKey").value.trim();
      const isBypass = document.getElementById("telegramBypass").checked;
      
      const status = document.getElementById("status");
      const btn = document.getElementById("submitBtn");
      
      if (!apiKey) {
        status.textContent = "Error: Please set your Gemini API Key in settings (⚙️)!";
        status.style.color = "red";
        return;
      }
      if (!url || !file) {
        status.textContent = "Error: Please provide both Link and Image!";
        status.style.color = "red";
        return;
      }

      status.textContent = isBypass ? "Processing Direct Link... Please wait." : "Processing with Telegram... Please wait.";
      status.style.color = "#333";
      btn.disabled = true;
      btn.style.background = "#555";

      const formData = new FormData();
      formData.append("productUrl", url);
      formData.append("productType", type);
      formData.append("productImage", file);
      formData.append("geminiApiKey", apiKey);
      formData.append("telegramBypass", isBypass);

      try {
        const res = await fetch("/api/publish", { method: "POST", body: formData });
        const data = await res.json();

        if (data.success) {
          status.textContent = "Successfully Published & RSS Updated!";
          status.style.color = "green";
        } else {
          status.textContent = "Error: " + data.error;
          status.style.color = "red";
        }
      } catch (err) {
        status.textContent = "System Error! Check backend logs.";
        status.style.color = "red";
      } finally {
        btn.disabled = false;
        btn.style.background = "#111";
      }
    }
  </script>
</body>
</html>
