<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styvora Bulk Auto-Publisher</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; padding: 20px; color: #111; }
    .container { max-width: 600px; background: #fff; padding: 30px; border-radius: 12px; margin: auto; border: 1px solid #e8e8e8; position: relative; }
    h2 { margin-top: 0; font-size: 24px; }
    
    .settings-btn { position: absolute; top: 25px; right: 25px; font-size: 24px; cursor: pointer; background: none; border: none; }
    .settings-box { display: none; background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    
    label { font-weight: bold; font-size: 14px; display: block; margin-top: 15px; margin-bottom: 5px; }
    input[type="text"], input[type="url"], input[type="password"], input[type="file"] { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; background: #fff; }
    
    .toggle-label { display: flex; align-items: center; cursor: pointer; margin-top: 15px; color: #d9534f; font-weight: bold;}
    .toggle-label input { width: auto; margin-right: 10px; transform: scale(1.3); }

    button.main-btn { width: 100%; margin-top: 20px; padding: 15px; background: #111; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    button.save-btn { width: 100%; margin-top: 15px; padding: 10px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    
    .console-log { background: #222; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-size: 13px; display: none; }
    .note { font-size: 13px; color: #666; margin-top: 8px; }
    #status { margin-top: 15px; font-weight: bold; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    <h2>Styvora Bulk Publisher</h2>
    
    <div id="settingsBox" class="settings-box">
      <label for="geminiKey">Gemini API Key</label>
      <input type="password" id="geminiKey" placeholder="Enter Gemini API Key">
      
      <label for="imageAiKey">Image AI API Key (Optional)</label>
      <input type="password" id="imageAiKey" placeholder="Enter Replicate/Image AI Key">

      <label for="productType">Product Type</label>
      <input type="text" id="productType" placeholder="e.g. Saree, Kurti">
      
      <label class="toggle-label">
        <input type="checkbox" id="telegramBypass"> Telegram Bypass (Direct Affiliate Link)
      </label>

      <button class="save-btn" onclick="saveSettings()">Save Settings</button>
      <div id="saveStatus" style="color: green; font-size: 12px; margin-top: 5px; display: none;">Settings Saved!</div>
    </div>
    
    <label for="excelFile">Upload Products Excel Sheet (.xlsx / .xls)</label>
    <input type="file" id="excelFile" accept=".xlsx, .xls">
    <div class="note">Excel-e অবশই 3টি Column থাকতে হবে: <b>product link</b>, <b>affiliate link</b>, এবং <b>image</b> (Direct URL)</div>
    
    <button class="main-btn" onclick="startBulkProcess()" id="submitBtn">Start Bulk Processing</button>
    
    <div id="status"></div>
    <div id="consoleLog" class="console-log"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("geminiApiKey")) document.getElementById("geminiKey").value = localStorage.getItem("geminiApiKey");
      if (localStorage.getItem("imageAiKey")) document.getElementById("imageAiKey").value = localStorage.getItem("imageAiKey");
      if (localStorage.getItem("productType")) document.getElementById("productType").value = localStorage.getItem("productType");
      document.getElementById("telegramBypass").checked = localStorage.getItem("telegramBypass") === "true";
    });

    function toggleSettings() {
      const box = document.getElementById("settingsBox");
      box.style.display = box.style.display === "block" ? "none" : "block";
    }

    function saveSettings() {
      localStorage.setItem("geminiApiKey", document.getElementById("geminiKey").value.trim());
      localStorage.setItem("imageAiKey", document.getElementById("imageAiKey").value.trim());
      localStorage.setItem("productType", document.getElementById("productType").value.trim());
      localStorage.setItem("telegramBypass", document.getElementById("telegramBypass").checked);
      
      const status = document.getElementById("saveStatus");
      status.style.display = "block";
      setTimeout(() => status.style.display = "none", 2000);
    }

    function logToConsole(text) {
      const consoleBox = document.getElementById("consoleLog");
      consoleBox.style.display = "block";
      consoleBox.innerHTML += `> ${text}<br>`;
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    async function startBulkProcess() {
      const fileInput = document.getElementById("excelFile");
      const status = document.getElementById("status");
      const btn = document.getElementById("submitBtn");
      
      const apiKey = localStorage.getItem("geminiApiKey");
      const imageAiKey = localStorage.getItem("imageAiKey") || "";
      const productType = localStorage.getItem("productType") || "Fashion Product";
      const isBypass = localStorage.getItem("telegramBypass") === "true";

      if (!apiKey) {
        alert("Please open Settings (⚙️) and save your Gemini API Key first!");
        return;
      }
      if (fileInput.files.length === 0) {
        alert("Please upload an Excel file!");
        return;
      }

      status.textContent = "Parsing Excel File...";
      status.style.color = "#333";
      document.getElementById("consoleLog").innerHTML = "";
      btn.disabled = true;

      // Step 1: Upload Excel to Backend to Parse Rows
      const formData = new FormData();
      formData.append("excelFile", fileInput.files[0]);

      try {
        const parseRes = await fetch("/api/parse-excel", { method: "POST", body: formData });
        const parseData = await parseRes.json();

        if (!parseData.success || parseData.products.length === 0) {
          throw new Error(parseData.error || "No valid products found in Excel.");
        }

        const products = parseData.products;
        logToConsole(`Found ${products.length} products in Excel sheet. Starting loop...`);

        // Step 2: Loop over each product sequentially
        for (let i = 0; i < products.length; i++) {
          status.textContent = `Processing product ${i + 1} of ${products.length}...`;
          logToConsole(`Processing Row ${i + 1}: ${products[i].productLink ? 'Valid Link' : 'No Link'}`);

          const singleRes = await fetch("/api/publish-single", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              productUrl: products[i].productLink,
              affiliateLink: products[i].affiliateLink,
              imageUrl: products[i].image,
              focusProduct: productType,
              geminiApiKey: apiKey,
              imageAiKey: imageAiKey,
              telegramBypass: isBypass
            })
          });

          const singleData = await singleRes.json();
          if (singleData.success) {
            logToConsole(`SUCCESS: ${singleData.title} Published & RSS Updated!`);
          } else {
            logToConsole(`FAILED Row ${i + 1}: ${singleData.error}`);
          }
        }

        status.textContent = "All products processed successfully!";
        status.style.color = "green";

      } catch (err) {
        status.textContent = "Error during bulk processing.";
        status.style.color = "red";
        logToConsole(`CRITICAL ERROR: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
