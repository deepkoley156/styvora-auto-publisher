<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styvora Bulk Auto-Publisher</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; padding: 20px; color: #111; }
    .container { max-width: 600px; background: #fff; padding: 30px; border-radius: 12px; margin: auto; border: 1px solid #e8e8e8; }
    
    .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h2 { margin: 0; font-size: 22px; }
    .settings-btn { font-size: 26px; cursor: pointer; background: none; border: none; padding: 0; }
    
    .settings-box { display: none; background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    
    label { font-weight: bold; font-size: 14px; display: block; margin-top: 15px; margin-bottom: 5px; }
    input[type="text"], input[type="url"], input[type="password"], input[type="file"], input[type="number"] { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; background: #fff; }
    
    .toggle-label { display: flex; align-items: center; cursor: pointer; margin-top: 15px; color: #d9534f; font-weight: bold;}
    .toggle-label input { width: auto; margin-right: 10px; transform: scale(1.3); }

    button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; padding: 15px; width: 100%; }
    .main-btn { margin-top: 20px; background: #111; color: #fff; }
    .save-btn { margin-top: 15px; padding: 10px; background: #333; color: #fff; border-radius: 6px; }
    
    .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
    .stop-btn { background: #d9534f; color: #fff; display: none; }
    .restart-btn { background: #f0ad4e; color: #111; display: none; }
    
    .console-log { background: #222; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 250px; overflow-y: auto; font-size: 13px; display: none; }
    .note { font-size: 13px; color: #666; margin-top: 8px; }
    #status { margin-top: 15px; font-weight: bold; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-wrap">
      <h2>Styvora Bulk Publisher</h2>
      <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    </div>
    
    <div id="settingsBox" class="settings-box">
      <label for="geminiKey">Gemini API Key</label>
      <input type="password" id="geminiKey" placeholder="Enter Gemini API Key">
      
      <label for="productType">AI Prompt Focus (e.g. Traditional Saree)</label>
      <input type="text" id="productType" placeholder="e.g. Saree, Kurti">
      
      <label for="siteCategory" style="color: #0066cc;">Website Category (Folder Name)</label>
      <input type="text" id="siteCategory" placeholder="e.g. sarees, jewelry, kurtis">
      <div class="note" style="margin-top:2px;">এই ফোল্ডারের ভেতরেই প্রোডাক্ট পেজটি সেভ হবে।</div>
      
      <label class="toggle-label">
        <input type="checkbox" id="telegramBypass"> Telegram Bypass (Direct Link)
      </label>

      <button class="save-btn" onclick="saveSettings()">Save Settings</button>
      <div id="saveStatus" style="color: green; font-size: 12px; margin-top: 5px; display: none;">Settings Saved!</div>
    </div>
    
    <label for="excelFile">Upload Products Sheet (.xlsx / .csv)</label>
    <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
    
    <label for="skipRows" style="color: #0066cc; margin-top: 20px;">Skip Rows (Optional)</label>
    <input type="number" id="skipRows" min="0" placeholder="e.g. 16">
    
    <button class="main-btn" onclick="startBulkProcess()" id="submitBtn">Start Bulk Processing</button>
    <div class="action-buttons">
      <button class="stop-btn" onclick="forceStop()" id="stopBtn">🛑 Force Stop</button>
      <button class="restart-btn" onclick="resumeProcessing()" id="restartBtn">🔄 Restart from Row <span id="restartRowTarget"></span></button>
    </div>
    
    <div id="status"></div>
    <div id="consoleLog" class="console-log"></div>
  </div>

  <script>
    let globalProductsList = [];
    let currentProcessingIndex = 0;
    let isProcessingActive = false;

    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("geminiApiKey")) document.getElementById("geminiKey").value = localStorage.getItem("geminiApiKey");
      if (localStorage.getItem("productType")) document.getElementById("productType").value = localStorage.getItem("productType");
      if (localStorage.getItem("siteCategory")) document.getElementById("siteCategory").value = localStorage.getItem("siteCategory");
      document.getElementById("telegramBypass").checked = localStorage.getItem("telegramBypass") === "true";
    });

    function toggleSettings() {
      const box = document.getElementById("settingsBox");
      box.style.display = box.style.display === "block" ? "none" : "block";
    }

    function saveSettings() {
      localStorage.setItem("geminiApiKey", document.getElementById("geminiKey").value.trim());
      localStorage.setItem("productType", document.getElementById("productType").value.trim());
      localStorage.setItem("siteCategory", document.getElementById("siteCategory").value.trim());
      localStorage.setItem("telegramBypass", document.getElementById("telegramBypass").checked);
      
      const status = document.getElementById("saveStatus");
      status.style.display = "block";
      setTimeout(() => status.style.display = "none", 2000);
    }

    function logToConsole(text, isError = false) {
      const consoleBox = document.getElementById("consoleLog");
      consoleBox.style.display = "block";
      const color = isError ? "#ff4d4d" : "#00ff00";
      consoleBox.innerHTML += `<span style="color: ${color}">> ${text}</span><br>`;
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function updateUIState(state) {
      const submitBtn = document.getElementById("submitBtn");
      const stopBtn = document.getElementById("stopBtn");
      const restartBtn = document.getElementById("restartBtn");

      if (state === 'running') {
        submitBtn.style.display = "none"; restartBtn.style.display = "none"; stopBtn.style.display = "block";
      } else if (state === 'paused') {
        submitBtn.style.display = "none"; stopBtn.style.display = "none"; restartBtn.style.display = "block";
        document.getElementById("restartRowTarget").innerText = currentProcessingIndex + 1;
      } else {
        submitBtn.style.display = "block"; stopBtn.style.display = "none"; restartBtn.style.display = "none"; submitBtn.disabled = false;
      }
    }

    function forceStop() {
      isProcessingActive = false;
      document.getElementById("status").textContent = "Process Forcefully Stopped!";
      document.getElementById("status").style.color = "red";
      logToConsole(`🛑 Process stopped at Row ${currentProcessingIndex + 1}.`, true);
      updateUIState('paused');
    }

    async function startBulkProcess() {
      const fileInput = document.getElementById("excelFile");
      const skipInput = document.getElementById("skipRows");
      const apiKey = localStorage.getItem("geminiApiKey");
      
      if (!apiKey) { alert("Please save Gemini API Key first!"); return; }
      if (fileInput.files.length === 0) { alert("Please upload a file!"); return; }

      document.getElementById("status").textContent = "Parsing File...";
      document.getElementById("consoleLog").innerHTML = "";
      document.getElementById("submitBtn").disabled = true;

      const formData = new FormData();
      formData.append("excelFile", fileInput.files[0]);

      try {
        const parseRes = await fetch("/api/parse-excel", { method: "POST", body: formData });
        const parseData = await parseRes.json();
        if (!parseData.success) throw new Error("No valid products found.");
        
        globalProductsList = parseData.products;
        currentProcessingIndex = parseInt(skipInput.value) || 0;
        resumeProcessing();
      } catch (err) {
        logToConsole(`ERROR: ${err.message}`, true);
        updateUIState('idle');
      }
    }

    async function resumeProcessing() {
      const status = document.getElementById("status");
      const apiKey = localStorage.getItem("geminiApiKey");
      const productType = localStorage.getItem("productType") || "Fashion Product";
      const siteCategory = localStorage.getItem("siteCategory") || "products";
      const isBypass = localStorage.getItem("telegramBypass") === "true";

      isProcessingActive = true;
      updateUIState('running');
      status.style.color = "#333";

      while (currentProcessingIndex < globalProductsList.length && isProcessingActive) {
        const product = globalProductsList[currentProcessingIndex];
        const rowNum = currentProcessingIndex + 1;
        
        status.textContent = `Processing product ${rowNum}...`;
        logToConsole(`Processing Row ${rowNum}...`);

        try {
          const singleRes = await fetch("/api/publish-single", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              productUrl: product.productLink,
              affiliateLink: product.affiliateLink,
              imageUrl: product.image,
              focusProduct: productType,
              siteCategory: siteCategory, // New Field Passed to Backend
              geminiApiKey: apiKey,
              telegramBypass: isBypass
            })
          });

          const singleData = await singleRes.json();
          if (singleData.success) {
            logToConsole(`✅ SUCCESS: Published to /${siteCategory}/ folder!`);
            currentProcessingIndex++;
          } else {
            isProcessingActive = false;
            logToConsole(`❌ FAILED: ${singleData.error}`, true);
            updateUIState('paused'); return;
          }
        } catch (error) {
          isProcessingActive = false;
          logToConsole(`❌ ERROR: ${error.message}`, true);
          updateUIState('paused'); return;
        }
      }
      if (currentProcessingIndex >= globalProductsList.length) {
        status.textContent = "Finished successfully!";
        status.style.color = "green";
        updateUIState('finished');
      }
    }
  </script>
</body>
</html>
